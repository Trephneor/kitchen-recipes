name: Publish to GitHub Pages

# The site is served from the gh-pages branch (Pages was auto-enabled when
# that branch was created). This workflow keeps gh-pages an exact mirror of
# main, so every push to main deploys the site — no Pages API permissions
# required. Keep the Pages source setting on "Deploy from a branch: gh-pages".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Mirror main to gh-pages
        run: git push --force origin HEAD:gh-pages
