name: Publish to GitHub Pages

# The site is served from the gh-pages branch (Pages was auto-enabled when
# that branch was created). This workflow keeps gh-pages an exact mirror of
# main. Keep the Pages source setting on "Deploy from a branch: gh-pages".
#
# The explicit build request matters: branch pushes made with GITHUB_TOKEN
# do not trigger the automatic "pages build and deployment" run, so without
# it the site would silently stay on the old version.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Mirror main to gh-pages
        run: git push --force origin HEAD:gh-pages
      - name: Request Pages build
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/pages/builds
